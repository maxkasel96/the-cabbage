# .github/workflows/docs-sync.yml
name: Docs Sync

on:
  push:
    branches:
      - docs-sync-test

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    env:
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_DOCS_WEBHOOK_URL: ${{ secrets.CONFLUENCE_DOCS_WEBHOOK_URL }}
      # Add these later when ready:
      # DOCS_SYNC_WEBHOOK_URL: ${{ secrets.DOCS_SYNC_WEBHOOK_URL }}
      # DOCS_SYNC_TOKEN: ${{ secrets.DOCS_SYNC_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs sync
        run: npm run docs:sync